<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 900" preserveAspectRatio="xMidYMid slice">
  <defs>
    <linearGradient id="floor" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#1a2230"/>
      <stop offset="0.55" stop-color="#2a3446"/>
      <stop offset="1" stop-color="#0b1017"/>
    </linearGradient>
    <radialGradient id="spot" cx="0.25" cy="0.3" r="0.6">
      <stop offset="0" stop-color="#3d5a7a" stop-opacity="0.6"/>
      <stop offset="1" stop-color="#0b1017" stop-opacity="0"/>
    </radialGradient>
    <pattern id="flake" x="0" y="0" width="28" height="28" patternUnits="userSpaceOnUse">
      <rect width="28" height="28" fill="transparent"/>
      <circle cx="6" cy="8" r="1.2" fill="#4b7aa8" fill-opacity="0.35"/>
      <circle cx="20" cy="18" r="1" fill="#a4b8cc" fill-opacity="0.3"/>
      <circle cx="14" cy="24" r="0.9" fill="#6c7c8d" fill-opacity="0.28"/>
      <circle cx="24" cy="5" r="0.7" fill="#3d5a7a" fill-opacity="0.3"/>
    </pattern>
  </defs>
  <rect width="1600" height="900" fill="url(#floor)"/>
  <rect width="1600" height="900" fill="url(#flake)"/>
  <rect width="1600" height="900" fill="url(#spot)"/>
  <!-- garage door suggestion -->
  <g opacity="0.22">
    <rect x="980" y="90" width="520" height="360" fill="#0b1017"/>
    <g stroke="#4b7aa8" stroke-width="2">
      <line x1="980" y1="160" x2="1500" y2="160"/>
      <line x1="980" y1="230" x2="1500" y2="230"/>
      <line x1="980" y1="300" x2="1500" y2="300"/>
      <line x1="980" y1="370" x2="1500" y2="370"/>
    </g>
  </g>
</svg>
